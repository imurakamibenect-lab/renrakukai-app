const sbHeaders = {

  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Prefer": "return=representation",
};

// Supabase REST API ヘルパー
const sb = {
  async select(table, query = "") {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
      headers: { ...sbHeaders, "Accept": "application/json" },
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async insert(table, row) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: sbHeaders,
      body: JSON.stringify(row),
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async update(table, id, patch) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "PATCH",
      headers: sbHeaders,
      body: JSON.stringify(patch),
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async delete(table, id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "DELETE",
      headers: sbHeaders,
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
};

// 全データをSupabaseから一括ロード
async function loadAllData() {
  const [members, users, projects, meetings, approvals, conflicts] = await Promise.all([
    sb.select("members", "order=name"),
    sb.select("users"),
    sb.select("projects", "order=created_at.desc"),
    sb.select("meetings", "order=meeting_datetime.desc"),
    sb.select("approvals", "order=created_at.desc"),
    sb.select("conflicts", "order=created_at.desc"),
  ]);
  return { members, users, projects, meetings, approvals, conflicts };
}
